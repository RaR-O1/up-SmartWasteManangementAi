<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Garbage - Smart Waste Management</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">

    <style>
        .form-container {
            max-width: 600px;
            margin: 2rem auto;
        }

        .w-100 { width: 100%; }
        .mb-2 { margin-bottom: 0.5rem; }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem;
            border-radius: 0.5rem;
            color: white;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .notification-success { background: #22c55e; }
        .notification-error { background: #ef4444; }
    </style>
</head>

<body>

<div class="container form-container">
    <div class="card">

        <div class="card-header">
            <h2>
                <i class="fas fa-flag" aria-hidden="true"></i> 
                Report Garbage
            </h2>
            <p>Help us keep the city clean</p>
        </div>

        <div class="card-body">

            <form id="report-form">

                <!-- Location -->
                <div class="form-group">
                    <label for="location" class="form-label">Location</label>

                    <button 
                        type="button"
                        id="get-location-btn"
                        class="btn btn-secondary mb-2"
                        aria-label="Get current location"
                    >
                        <i class="fas fa-location-dot" aria-hidden="true"></i> 
                        Get Current Location
                    </button>

                    <input 
                        type="text"
                        id="location"
                        class="form-input"
                        placeholder="Or enter address"
                        required
                    >
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label for="description" class="form-label">Description</label>
                    <textarea 
                        id="description"
                        class="form-textarea"
                        rows="4"
                        placeholder="Describe the waste issue..."
                        required
                    ></textarea>
                </div>

                <!-- Photo -->
                <div class="form-group">
                    <label for="photo" class="form-label">Photo (Optional)</label>
                    <input 
                        type="file"
                        id="photo"
                        accept="image/*"
                        class="form-input"
                    >
                </div>

                <!-- Type -->
                <div class="form-group">
                    <label for="type" class="form-label">Report Type</label>
                    <select id="type" class="form-select">
                        <option value="WASTE">Illegal Waste Dumping</option>
                        <option value="BIN_DAMAGE">Damaged Bin</option>
                        <option value="MISSED_COLLECTION">Missed Collection</option>
                        <option value="OTHER">Other Issue</option>
                    </select>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary btn-large w-100">
                    <i class="fas fa-paper-plane" aria-hidden="true"></i> 
                    Submit Report
                </button>

            </form>

        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>

<script>
let userLocation = null;

// ✅ Better event listener (no inline JS)
document.getElementById('get-location-btn').addEventListener('click', getLocation);

function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                userLocation = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };

                document.getElementById('location').value =
                    `${userLocation.lat}, ${userLocation.lng}`;

                showNotification('Location captured!', 'success');
            },
            () => showNotification('Failed to get location', 'error')
        );
    }
}

document.getElementById('report-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData();

    formData.append('location', document.getElementById('location').value);
    formData.append('description', document.getElementById('description').value);
    formData.append('type', document.getElementById('type').value);

    if (userLocation) {
        formData.append('latitude', userLocation.lat);
        formData.append('longitude', userLocation.lng);
    }

    const photo = document.getElementById('photo').files[0];
    if (photo) formData.append('photo', photo);

    try {
        const token = localStorage.getItem('token');

        const res = await fetch('http://localhost:5000/api/report/submit', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });

        const data = await res.json();

        if (data.success) {
            showNotification('Report submitted successfully!', 'success');
            setTimeout(() => {
                window.location.href = '/dashboard/household.html';
            }, 2000);
        } else {
            showNotification('Failed to submit report', 'error');
        }

    } catch (error) {
        showNotification('Server error', 'error');
    }
});

// ✅ Safe notification (no innerHTML injection)
function showNotification(message, type) {
    const n = document.createElement('div');
    n.className = `notification notification-${type}`;

    const icon = document.createElement('i');
    icon.className = `fas ${
        type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'
    }`;

    const text = document.createElement('span');
    text.textContent = message;

    n.appendChild(icon);
    n.appendChild(text);

    document.body.appendChild(n);

    setTimeout(() => n.remove(), 3000);
}
</script>

</body>
</html>
